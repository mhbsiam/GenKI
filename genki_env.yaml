name: ogenki
channels:
  - conda-forge

dependencies:
  # ── Runtime ─────────────────────────────────────────────────────
  - python=3.12          # Required by scanpy 1.12, numba 0.61+, PyG 2.3+
  - pip>=24.0

  # ── Core scientific stack ────────────────────────────────────────
  - anndata>=0.10         # scanpy 1.12 hard-requires anndata>=0.10
  - numpy>=1.24,<2.4      # numba 0.61 compatible range
  - matplotlib-base>=3.8
  - pandas>=2.0
  - scipy>=1.12
  - seaborn>=0.13
  - h5py>=3.9
  - tqdm>=4.66

  # ── Statistics & graph utilities ─────────────────────────────────
  - patsy>=0.5
  - networkx>=3.2
  - natsort>=8.4
  - joblib>=1.3

  # ── Dimensionality reduction ─────────────────────────────────────
  - numba>=0.61           # 0.61+ required for Python 3.12 (dropped 3.9)
  - umap-learn>=0.5.6

  # ── Graph-based clustering ───────────────────────────────────────
  - leidenalg>=0.10
  - louvain>=0.6.3        # 0.6.2 excluded (known bug)

  # ── Packaging & build ────────────────────────────────────────────
  - packaging>=24.0
  - setuptools-scm>=8.0
  - flit-core>=3.9

  # ── Developer & testing tools ────────────────────────────────────
  - black>=24.0
  - docutils>=0.21
  - sphinx>=7.2,<8.0      # Sphinx 7.x required for Python 3.12 compat
  - sphinx_rtd_theme>=2.0
  - pytest>=8.0
  - pytest-nunit

  # ── Data I/O ─────────────────────────────────────────────────────
  - dask-core>=2024.2
  - fsspec>=2024.2
  - zarr>=2.17
  - zappy

  # ── Notebook ─────────────────────────────────────────────────────
  - ipywidgets>=8.1

  - pip:
    # ── Build & docs ─────────────────────────────────────────────
    - flit
    - session-info
    - scanpydoc>=0.7.4,<0.7.6

    # ── PyTorch: installed MANUALLY after env creation (see below) ─
    # tensorboard only listed here; torch itself must use index-url
    - tensorboard>=2.17

    # ── Graph Neural Networks ─────────────────────────────────────
    - torch_geometric       # PyG 2.3+ works standalone (no C++ extras needed)

    # ── ML & bioinformatics ───────────────────────────────────────
    - scikit-learn>=1.4
    - scikit-misc>=0.3
    - scanpy>=1.12          # 1.12 (Jan 2026): Python 3.12+, anndata>=0.10
    - ray>=2.30
    - notebook>=7.2
