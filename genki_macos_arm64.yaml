name: genki
# Conda environment for GenKI on macOS (arm64 / Apple Silicon M-series)
# Created: 2026-03-13
#
# Setup:
#   conda env create -f genki_macos_arm64.yaml
#   conda activate genki
#
# Standard PyPI wheels include MPS support for Apple Silicon automatically.
# To verify MPS is available after activation:
#   python -c "import torch; print(torch.backends.mps.is_available())"

variables:
  KMP_DUPLICATE_LIB_OK: "TRUE"  # Prevents PyTorch/OpenMP crash on macOS Apple Silicon

channels:
  - conda-forge   # Best arm64 binary coverage
  - defaults

dependencies:
  # ── Python runtime ──────────────────────────────────────────────────
  - python=3.12
  - pip>=24.0

  # ── Core scientific stack ────────────────────────────────────────────
  - numpy>=1.24,<2.4        # numba 0.61 compatible range
  - scipy>=1.12
  - pandas>=2.0
  - matplotlib-base>=3.8
  - seaborn>=0.13
  - h5py>=3.9
  - tqdm>=4.66
  - statsmodels>=0.14       # Used in GenKI/utils.py (OLS regression)

  # ── Bioinformatics ───────────────────────────────────────────────────
  - anndata>=0.10            # scanpy 1.12 hard-requires anndata>=0.10
  - hdf5>=1.14               # arm64 HDF5 backend

  # ── Statistics & graph utilities ─────────────────────────────────────
  - patsy>=0.5
  - networkx>=3.2
  - natsort>=8.4
  - joblib>=1.3

  # ── Dimensionality reduction ──────────────────────────────────────────
  - numba>=0.61              # 0.61+ required for Python 3.12 on arm64
  - umap-learn>=0.5.6

  # ── Graph-based clustering ────────────────────────────────────────────
  - leidenalg>=0.10
  - louvain>=0.6.3           # 0.6.2 excluded (known bug)

  # ── Data I/O ──────────────────────────────────────────────────────────
  - dask-core>=2024.2
  - fsspec>=2024.2
  - zarr>=2.17

  # ── Packaging & build ─────────────────────────────────────────────────
  - packaging>=24.0
  - setuptools-scm>=8.0
  - flit-core>=3.9

  # ── Developer & testing tools ─────────────────────────────────────────
  - black>=24.0
  - pytest>=8.0
  - pytest-nunit

  # ── Notebook ──────────────────────────────────────────────────────────
  - ipywidgets>=8.1
  - notebook>=7.2

  - pip:
    # ── PyTorch — default PyPI wheels (MPS included for Apple Silicon) ──
    # No --index-url needed; standard PyPI arm64 wheels include MPS support.
    - torch>=2.4
    - torchvision>=0.19
    - torchaudio>=2.4

    # ── Graph Neural Networks ───────────────────────────────────────────
    # PyG 2.5+ works without optional C++ extensions for basic GCN usage
    - torch_geometric>=2.5
    - tensorboard>=2.17

    # ── ML & bioinformatics ─────────────────────────────────────────────
    - scikit-learn>=1.4
    - scikit-misc>=0.3
    - scanpy>=1.12
    - ray>=2.30

    # ── Misc ────────────────────────────────────────────────────────────
    - session-info
    - flit
